<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Prueba Carga RPT / Excel</title>

<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, doc, writeBatch, getDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

// 🔥 FIREBASE
const firebaseConfig = {
  apiKey: "AIzaSyCK5nb6u2CGRJ8AB1aPlRn54b97bdeAFeM",
  authDomain: "inventariopv-643f1.firebaseapp.com",
  projectId: "inventariopv-643f1",
  storageBucket: "inventariopv-643f1.firebasestorage.app",
  messagingSenderId: "96242533231",
  appId: "1:96242533231:web:aae75a18fbaf9840529e9a"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

// 🚀 EVENTO
window.addEventListener("DOMContentLoaded", () => {
  document.getElementById("fileInput").addEventListener("change", leerArchivo);
});

// 📥 LEER ARCHIVO
async function leerArchivo(e) {

  const file = e.target.files[0];
  if (!file) return;

  const nombre = file.name.toLowerCase();

  document.getElementById("estado").innerText = "Procesando archivo...";

  const reader = new FileReader();

  // 🔥 EXCEL
  if (nombre.endsWith(".xlsx") || nombre.endsWith(".xls")) {

    reader.onload = async (e) => {
      const data = new Uint8Array(e.target.result);
      const workbook = XLSX.read(data, { type: "array" });

      const hoja = workbook.Sheets[workbook.SheetNames[0]];
      let json = XLSX.utils.sheet_to_json(hoja);

      procesarYMostrar(json);
    };

    reader.readAsArrayBuffer(file);
  }

  // 🔥 RPT
  else {

    reader.onload = async (e) => {

      const texto = e.target.result;

      let json = convertirRPTaJSON(texto);

      procesarYMostrar(json);
    };

    reader.readAsText(file);
  }
}

// 🔥 CONVERTIR RPT
function convertirRPTaJSON(texto) {

  const lineas = texto.split("\n");
  let datos = [];

for (let linea of lineas) {

  linea = linea.trim();

  if (
    linea === "" ||
    linea.includes("Sucursal") ||
    linea.includes("Reporte") ||
    linea.includes("Pag") ||
    linea.includes("---") ||
    linea.includes("Fecha") ||
    linea.includes("Vendida")
  ) continue;

if (/^\d{2}\/\d{2}\/\d{4}/.test(linea)) {

  // 🔥 Regex más flexible y controlado
  const match = linea.match(
    /^(\d{2}\/\d{2}\/\d{4})\s+(\d+)\s+(\d+)\s+(.+?)\s+(\d+\.\d+|\d+)\s+(\d+\.\d+|\d+)\s+.*?\s+(\d+\.\d+|\d+)\s+.*?\s+(\d+)\s+(.+)$/
  );

  if (!match) {
    console.warn("No parseó:", linea);
    continue;
  }

const [
  _,
  fecha,
  venta,
  codigo,
  descripcion,
  cantidad,
  costo,
  _basura,   // ← este era el total malo
  cliente,
  nombreCliente
] = match;

// 🔥 EXTRAER TODOS LOS NÚMEROS UNA SOLA VEZ
const numeros = linea.match(/(\d+\.\d+|\d+)/g);

// 🔥 CANTIDAD REAL
let cantidadReal = Number(cantidad);

// 🔥 TOTAL REAL
let totalReal = 0;
if (numeros && numeros.length >= 4) {
  totalReal = Number(numeros[numeros.length - 4]);
}
if (cantidadReal > 1000) {
  console.warn("Cantidad sospechosa:", cantidadReal);
  cantidadReal = 1;
}

  datos.push({
    "Fecha": fecha,
    "Venta": Number(venta),
    "Codigo": Number(codigo),
    "descripcion": descripcion.trim(),
    "Cantidad vendida": cantidadReal,
    "Costo compra": Number(costo),
    "venta Total": totalReal,
    "Cliente": Number(cliente),
    "nombre cliente": nombreCliente.trim()
  });
}
}

return datos;
}
// 🔄 TRANSFORMAR SI VIENE CRUDO
function transformarArchivoOriginal(data) {

  return data.map(fila => ({
    "Fecha": fila["Fecha"],
    "Venta": fila["#Venta"] || fila["Venta"],
    "Codigo": fila["Codigo"],
    "descripcion": fila["Nombre"],
    "Cantidad vendida": Number(fila["Cantidad Vendida"] || fila["Cantidad vendida"]) || 0,
    "Costo compra": Number(fila["Costo Compra"] || fila["Costo compra"]) || 0,
    "venta Pza": Number(fila["Vta Pza C/IVA"] || fila["venta Pza"]) || 0,
    "venta Total": Number(fila["Vta Total C/IVA"] || fila["venta Total"]) || 0,
    "departamento": fila["Depto."] || fila["departamento"],
    "Cliente": fila["Cliente"] || 0,
    "nombre cliente": fila["Nombre.1"] || fila["Nombre cliente"] || fila["Nombre"]
  }));
}

// 🧹 LIMPIAR
function limpiarFila(fila) {

  let obj = {};

  for (let key in fila) {

    let valor = fila[key];

    if (typeof valor === "string") {
      let num = Number(valor);
      if (!isNaN(num) && valor !== "") {
        valor = num;
      }
    }

    if (typeof valor === "number" && isNaN(valor)) {
      valor = 0;
    }

    obj[key] = valor;
  }

  return obj;
}

// 🔥 PROCESAR + PREVIEW
function procesarYMostrar(json) {

  if (!json || json.length === 0) {
    alert("No se detectaron datos válidos");
    return;
  }

  if (json[0]["#Venta"] || json[0]["Vta Total C/IVA"]) {
    json = transformarArchivoOriginal(json);
  }

  json = json.map(limpiarFila);

  console.log("RESULTADO FINAL:", json);

  mostrarTabla(json);

  window.datosListos = json;
}

// 📊 MOSTRAR TABLA
function mostrarTabla(data) {

  let html = "<table><tr>";

  Object.keys(data[0]).forEach(k => {
    html += `<th>${k}</th>`;
  });

  html += "</tr>";

  data.forEach(row => {
    html += "<tr>";
    Object.values(row).forEach(v => {
      html += `<td>${v}</td>`;
    });
    html += "</tr>";
  });

  html += "</table>";

  document.getElementById("preview").innerHTML = html;
  document.getElementById("estado").innerText = "✅ Datos listos (preview abajo)";
}

// 🔥 ESTA VA AQUÍ 👇
function sleep(ms) {
  return new Promise(resolve => setTimeout(resolve, ms));
}

// 🚀 SUBIR
async function subirBatch(data) {
  let subidos = 0;
  let ignorados = 0;

  const BATCH_SIZE = 400;
  const DELAY = 500; // ms entre lotes

  let total = data.length;
  let procesados = 0;

  document.getElementById("estado").innerText = "Subiendo datos...";

  for (let i = 0; i < total; i += BATCH_SIZE) {

    let batch = writeBatch(db);

    let chunk = data.slice(i, i + BATCH_SIZE);

for (const fila of chunk) {

  const id = crypto.randomUUID();
  const ref = doc(db, "TIENDAS", "ALLENDE 1", "ventas", id);

batch.set(ref, fila);
subidos++;
}

    try {
      await batch.commit();
    } catch (error) {
      console.error("Error en lote:", error);
      alert("Error en subida, revisa consola");
      return;
    }

    procesados = subidos + ignorados;

    // 🔥 progreso
    document.getElementById("estado").innerText =
      `Procesados ${procesados}/${total} | Nuevos: ${subidos} | Duplicados: ${ignorados}`;
      let porcentaje = Math.floor((procesados / total) * 100);

let barra = document.getElementById("barra");
barra.style.width = porcentaje + "%";
barra.innerText = porcentaje + "%";

    console.log(`✔ Lote subido: ${procesados}/${total}`);

    // 🔥 PAUSA para no saturar Firebase
    await sleep(DELAY);
  }

  document.getElementById("estado").innerText =
  `✅ Subidos: ${subidos} | Ignorados: ${ignorados}`;
  alert(`Carga completa\nSubidos: ${subidos}\nIgnorados: ${ignorados}`);
}

window.subir = async function () {

  if (!window.datosListos) {
    alert("Primero carga un archivo");
    return;
  }

  await subirBatch(window.datosListos);
  document.getElementById("barra").style.width = "100%";
document.getElementById("barra").innerText = "100%";
};
</script>

</body>
