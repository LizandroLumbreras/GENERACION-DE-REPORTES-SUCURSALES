<!DOCTYPE html>
<html lang="es">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<title>PROVSOFT · Dashboard Ventas</title>

<style>
:root{
  --azul1:#00416A;
  --azul2:#0c6cbd;
  --gris:#f4f6f9;
  --card:#ffffff;
  --radius:14px;
  --shadow:0 8px 24px rgba(0,0,0,.18);
}

*{box-sizing:border-box;font-family:'Segoe UI',sans-serif;}

body{
  margin:0;
  background:linear-gradient(135deg,var(--azul1),var(--azul2));
  padding:30px;
}

h1{
  color:#fff;
  text-align:center;
  margin-bottom:30px;
}

.container{
  background:var(--gris);
  padding:25px;
  border-radius:var(--radius);
}

select{
  padding:10px;
  font-size:16px;
  border-radius:8px;
  border:none;
  margin-bottom:20px;
}

.card-total{
  background:var(--card);
  padding:20px;
  border-radius:var(--radius);
  box-shadow:var(--shadow);
  margin-bottom:20px;
  font-size:18px;
  font-weight:bold;
}

table{
  width:100%;
  border-collapse:collapse;
  background:var(--card);
  border-radius:var(--radius);
  overflow:hidden;
  box-shadow:var(--shadow);
}

th{
  background:var(--azul1);
  color:#fff;
  padding:12px;
  text-align:left;
}

td{
  padding:10px;
  border-bottom:1px solid #eee;
}

tr:hover{
  background:#f1f1f1;
}

.loading{
  color:#fff;
  text-align:center;
  margin-top:15px;
}
.lista-item{
  display:flex;
  align-items:center;
  justify-content:space-between;
  background:#fff;
  padding:10px 15px;
  border-radius:10px;
  margin-bottom:8px;
  box-shadow:0 2px 6px rgba(0,0,0,.08);
  font-size:14px;
}

.color-box{
  width:14px;
  height:14px;
  border-radius:4px;
  margin-right:10px;
}

.item-left{
  display:flex;
  align-items:center;
  gap:10px;
}

.item-right{
  font-weight:bold;
}
.modal{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.55);
  display:none;
  justify-content:center;
  align-items:center;
  z-index:999;
}

.modal-content{
  background:#fff;
  width:420px;
  max-width:90%;
  border-radius:16px;
  padding:20px;
  box-shadow:0 20px 50px rgba(0,0,0,.3);
  animation:fadeIn .25s ease;
}

@keyframes fadeIn{
  from{transform:scale(.95);opacity:0}
  to{transform:scale(1);opacity:1}
}

.modal-header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:15px;
}

.modal-header h3{
  margin:0;
}

.modal-header button{
  background:none;
  border:none;
  font-size:18px;
  cursor:pointer;
}

.cliente-item{
  display:flex;
  justify-content:space-between;
  padding:8px 0;
  border-bottom:1px solid #eee;
}
</style>

async function cargarDatos(sucursal){

  loading.textContent = "Cargando datos...";

  const { data, error } = await supabase.rpc("ventas_por_departamento", {
    sucursal_param: sucursal
  });

  if(error){
    console.error(error);
    loading.textContent = "Error cargando datos";
    return;
  }

  tablaBody.innerHTML = "";
  let total = 0;

data.forEach((row)=>{
  const tr = document.createElement("tr");

  tr.innerHTML = `
    <td class="departamento-click" data-depto="${row.departamento}">
  <span style="cursor:pointer; color:#00416A; font-weight:600;">
    ${row.departamento}
  </span>
</td>
    <td>${Number(row.cantidad_vendida).toLocaleString()}</td>
    <td>$${Number(row.costo_compra_total).toLocaleString()}</td>
    <td>$${Number(row.venta_total).toLocaleString()}</td>
  `;

  tablaBody.appendChild(tr);
  total += Number(row.venta_total);
});

  totalGeneral.textContent = "Total Venta: $" + total.toLocaleString();
  loading.textContent = "";
}

 data.forEach((row, index)=>{

function limpiarTexto(texto){
  return texto
    .normalize("NFD")
    .replace(/[\u0300-\u036f]/g, "") // quitar acentos
    .replace(/[^\w\sÁÉÍÓÚÜÑáéíóúüñ.,-]/g, "") // quitar caracteres raros
    .replace(/\s+/g, " ") // espacios dobles
    .trim();
}

}
doc.save(`Reporte_${sucursal}.pdf`);
}
</script>
