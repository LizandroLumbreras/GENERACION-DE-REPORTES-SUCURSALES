<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Descarga Firebase PRO</title>

<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { 
  getFirestore, 
  collection, 
  getDocs
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

// 🔥 CONFIG
const firebaseConfig = {
  apiKey: "TU_API_KEY",
  authDomain: "inventariopv-643f1.firebaseapp.com",
  projectId: "inventariopv-643f1",
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

// 🔥 AUTO DETECCIÓN DE SUBCOLECCIONES
window.cargarDatos = async function () {

  document.getElementById("estado").innerText = "Cargando...";

  let resultados = [];

  // 🔥 POSIBLES SUBCOLECCIONES (se detectan automáticamente si existen)
  const posiblesSub = [
    "EDGARDO",
    "LIZANDRO",
    "ROBERTO",
    "USUARIO2"
  ];

  for (const sub of posiblesSub) {

    try {

      const ref = collection(
        db,
        "REVISION SUCURSALES",
        "CENTRAL",
        sub
      );

      const snap = await getDocs(ref);

      if (!snap.empty) {

        snap.forEach(doc => {
          resultados.push({
            subcoleccion: sub,
            id: doc.id,
            ...doc.data()
          });
        });

      }

    } catch (e) {
      console.log("No existe:", sub);
    }
  }

  window.datos = resultados;

  mostrarTabla(resultados);

  document.getElementById("estado").innerText =
    `✅ ${resultados.length} registros`;
};

// 📊 TABLA
function mostrarTabla(data) {

  if (!data.length) {
    document.getElementById("tabla").innerHTML = "Sin datos";
    return;
  }

  const columnas = [...new Set(data.flatMap(obj => Object.keys(obj)))];

  let html = "<table><tr>";

  columnas.forEach(col => {
    html += `<th>${col}</th>`;
  });

  html += "</tr>";

  data.forEach(row => {
    html += "<tr>";
    columnas.forEach(col => {
      html += `<td>${row[col] ?? ""}</td>`;
    });
    html += "</tr>";
  });

  html += "</table>";

  document.getElementById("tabla").innerHTML = html;
}

// 📥 EXCEL
window.descargar = function () {

  const data = window.datos;

  if (!data || data.length === 0) {
    alert("No hay datos");
    return;
  }

  const columnas = [...new Set(data.flatMap(obj => Object.keys(obj)))];

  const filas = data.map(obj => {
    let fila = {};
    columnas.forEach(col => fila[col] = obj[col] ?? "");
    return fila;
  });

  const ws = XLSX.utils.json_to_sheet(filas);
  const wb = XLSX.utils.book_new();

  XLSX.utils.book_append_sheet(wb, ws, "REVISION");

  XLSX.writeFile(wb, "revision_sucursales.xlsx");
};
</script>

<style>
body{
  font-family: Arial;
  background:#0f172a;
  color:white;
  padding:30px;
  text-align:center;
}
button{
  padding:10px;
  margin:10px;
}
table{
  margin-top:20px;
  border-collapse: collapse;
  width:100%;
  background:white;
  color:black;
}
th,td{
  padding:6px;
  border:1px solid #ddd;
}
</style>
</head>

<body>

<h1>📊 REVISION SUCURSALES - CENTRAL</h1>

<button onclick="cargarDatos()">Cargar datos</button>
<button onclick="descargar()">Descargar Excel</button>

<h3 id="estado"></h3>

<div id="tabla"></div>

</body>
</html>
