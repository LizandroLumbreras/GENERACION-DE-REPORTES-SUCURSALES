<style>

:root{

*{

}

body{
 margin:0;

h1{

.container{

select{

td{

tr:hover{

.loading{

.item-right{

.modal-header button{

<script type="module">

import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";
import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm";

const SUPA_URL = "https://cvpbtjlupswbyxenugpz.supabase.co";

const SUPA_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImN2cGJ0amx1cHN3Ynl4ZW51Z3B6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NDc3MDIxOTQsImV4cCI6MjA2MzI3ODE5NH0.iiJsYM3TtaGPdeCtPcEXwAz3LfFc1uJGECEvOErvrqY";

const supabase = createClient(SUPA_URL, SUPA_KEY);

const firebaseConfig = {
 apiKey: "AIzaSyCK5nb6u2CGRJ8AB1aPlRn54b97bdeAFeM",
 authDomain: "inventariopv-643f1.firebaseapp.com",
 projectId: "inventariopv-643f1",
 storageBucket: "inventariopv-643f1.firebasestorage.app",
 messagingSenderId: "96242533231",
 appId: "1:96242533231:web:aae75a18fbaf9840529e9a"
};

const appFirebase = initializeApp(firebaseConfig);
const db = getFirestore(appFirebase);

let impuestosDepartamentos = {};

const sucursalSelect = document.getElementById("sucursalSelect");
const mesSelect = document.getElementById("mesSelect");

const tablaBody = document.getElementById("tablaBody");



const totalGeneral = document.getElementById("totalGeneral");
const loading = document.getElementById("loading");
async function cargarImpuestos(){

 const snapshot = await getDocs(collection(db,"departamentos_venta"));

 snapshot.forEach((doc)=>{

  const data = doc.data();

  impuestosDepartamentos[data.nombre] = {
   iva: Number(data.iva || 0),
   ieps: Number(data.ieps || 0)
  };

 });

 console.log("Impuestos cargados:", impuestosDepartamentos);

}

async function cargarSucursales(){

 const { data, error } = await supabase.rpc("obtener_sucursales");
 console.log(data);

 if(error){
  console.error("Error sucursales:", error);
  return;
 }

 sucursalSelect.innerHTML = `
<option value="GLOBAL">TODAS LAS SUCURSALES</option>
`;

 if(!data || data.length === 0){
  console.warn("No hay sucursales");
  return;
 }

 data.forEach(row=>{

  const sucursal = row.sucursal || row.nombre || row.nombre_sucursal;

  if(!sucursal) return;

  const option = document.createElement("option");

  option.value = sucursal;
  option.textContent = sucursal;

  sucursalSelect.appendChild(option);

 });

}
async function cargarMeses(){

 const { data, error } = await supabase.rpc("obtener_meses_disponibles");

 if(error){
  console.error(error);
  return;
 }

 mesSelect.innerHTML = `<option value="TODOS">TODO EL AÑO</option>`;

 data.forEach(row=>{

  const option = document.createElement("option");

  option.value = row.mes;

  const [anio, mes] = row.mes.split("-");

  const nombreMes = new Date(anio, mes - 1)
  .toLocaleString("es-MX",{ month:"long" });

  option.textContent = `${nombreMes.toUpperCase()} ${anio}`;

  mesSelect.appendChild(option);

 });

}
async function cargarDatos(sucursal){

 loading.textContent = "Cargando datos...";

 const { data, error } = await supabase.rpc("ventas_por_departamento",{
  sucursal_param: sucursal,
  mes_param: mesSelect.value
 });

 if(error){
  console.error(error);
  loading.textContent = "Error cargando datos";
  return;
 }

 tablaBody.innerHTML = "";

 let total = 0;
 let totalCosto = 0;
let totalSubtotal = 0;
let totalIVA = 0;
let totalIEPS = 0;
let totalVenta = 0;
let totalUtilidad = 0;

data.forEach((row)=>{

const venta = Number(row.venta_total);
const costo = Number(row.costo_compra_total);
const impuesto = impuestosDepartamentos[row.departamento] || {iva:0,ieps:0};


let iva = 0;
let ieps = 0;

if(impuesto.iva === 16){
 iva = venta - (venta / 1.16);
}

if(impuesto.ieps === 8){
 ieps = venta - (venta / 1.08);
}

const subtotal = venta - iva - ieps;
const utilidad = subtotal - costo;
totalCosto += costo;
totalSubtotal += subtotal;
totalIVA += iva;
totalIEPS += ieps;
totalVenta += venta;
totalUtilidad += utilidad;

 const tr = document.createElement("tr");

 tr.innerHTML = `
<td class="departamento-click" data-depto="${row.departamento}">
<span style="cursor:pointer; color:#00416A; font-weight:600;">
${row.departamento}
</span>
</td>

<td>$${costo.toLocaleString()}</td>
<td>$${subtotal.toLocaleString('es-MX',{minimumFractionDigits:2})}</td>
<td>$${iva.toLocaleString('es-MX',{minimumFractionDigits:2})}</td>
<td>$${ieps.toLocaleString('es-MX',{minimumFractionDigits:2})}</td>
<td>$${venta.toLocaleString()}</td>
<td>$${utilidad.toLocaleString('es-MX',{minimumFractionDigits:2})}</td>
`;

 tablaBody.appendChild(tr);


 total += venta;

});
 const trTotal = document.createElement("tr");

trTotal.style.fontWeight = "bold";
trTotal.style.background = "#e2e8f0";

trTotal.innerHTML = `
<td>TOTAL</td>
<td>$${totalCosto.toLocaleString('es-MX',{minimumFractionDigits:2})}</td>
<td>$${totalSubtotal.toLocaleString('es-MX',{minimumFractionDigits:2})}</td>
<td>$${totalIVA.toLocaleString('es-MX',{minimumFractionDigits:2})}</td>
<td>$${totalIEPS.toLocaleString('es-MX',{minimumFractionDigits:2})}</td>
<td>$${totalVenta.toLocaleString('es-MX',{minimumFractionDigits:2})}</td>
<td>$${totalUtilidad.toLocaleString('es-MX',{minimumFractionDigits:2})}</td>
`;

tablaBody.appendChild(trTotal);

 totalGeneral.textContent = "Total Venta: $" + total.toLocaleString();

 loading.textContent = "";

}
async function mostrarDetalleDepartamento(departamento){

 const sucursal = sucursalSelect.value || "GLOBAL";

 const modal = document.getElementById("modalDepto");
 const titulo = document.getElementById("tituloModal");
 const divArticulos = document.getElementById("topArticulos");
 const divClientes = document.getElementById("topClientes");

 titulo.textContent = "Detalle: " + departamento;

 divArticulos.innerHTML = "Cargando...";
 divClientes.innerHTML = "Cargando...";

 modal.style.display = "flex";

 // 🔵 TOP ARTÍCULOS
 const { data: articulos } = await supabase.rpc(
   "top_articulos_departamento",
   {
     sucursal_param: sucursal,
     departamento_param: departamento,
     mes_param: mesSelect.value
   }
 );

divArticulos.innerHTML = "";

if(articulos && articulos.length){

 articulos.slice(0,5).forEach((a,i)=>{

  const div = document.createElement("div");
  div.className = "item-card";

  div.innerHTML = `
    <div class="item-left">
      #${i+1} ${a.descripcion || a.codigo}
    </div>
    <div class="item-right">
      $${Number(a.total_venta).toLocaleString()}
    </div>
  `;

  divArticulos.appendChild(div);

 });

}else{
 divArticulos.innerHTML = "Sin datos";
}

 // 🟢 TOP CLIENTES
 const { data: clientes } = await supabase.rpc(
   "top_clientes_departamento",
   {
     sucursal_param: sucursal,
     departamento_param: departamento,
     mes_param: mesSelect.value
   }
 );

divClientes.innerHTML = "";

divClientes.innerHTML = "";

if(clientes && clientes.length){

 clientes.slice(0,5).forEach((c,i)=>{

  const div = document.createElement("div");
  div.className = "item-card";

  div.innerHTML = `
    <div class="item-left">
      #${i+1} ${c.nombre_cliente || "SIN NOMBRE"}
    </div>
    <div class="item-right">
      $${Number(c.total_comprado).toLocaleString()}
    </div>
  `;

  divClientes.appendChild(div);

 });

}else{
 divClientes.innerHTML = "Sin datos";
}
} // 🔥 ESTA LLAVE CIERRA LA FUNCIÓN
tablaBody.addEventListener("click",(e)=>{

 const celda = e.target.closest(".departamento-click");

 if(!celda) return;

 const departamento = celda.dataset.depto;

 mostrarDetalleDepartamento(departamento);

});

`;

tablaBody.appendChild(trTotal);
 totalGeneral.textContent = "Total Venta: $" + total.toLocaleString();

cargarSucursales().then(async ()=>{

 await cargarImpuestos();

});

sucursalSelect.addEventListener("change",()=>{

 const sucursal = sucursalSelect.value;

 if(!sucursal) return;

if(sucursal === "GLOBAL"){

}
else if(sucursal === "BODEGA 41"){

}
 else{

 sucursalSelect.dispatchEvent(new Event("change"));

});

});

async function generarReporte(){

 const { jsPDF } = window.jspdf;

 const doc = new jsPDF();

 const sucursal = sucursalSelect.value || "GLOBAL";
 const fecha = new Date().toLocaleString();

 let y = 15;

 doc.setFontSize(16);
 doc.text("PROVEEDORA DE DULCES Y DESECHABLES",14,y);

 y+=8;

 doc.setFontSize(12);
doc.text("REPORTE DE VENTAS POR DEPARTAMENTO",14,y);

 y+=6;
 doc.text(`SUCURSAL: ${sucursal}`,14,y);

 y+=6;
 doc.text(`FECHA: ${fecha}`,14,y);

 y+=10;

 doc.setFontSize(14);
 doc.text("RESUMEN POR DEPARTAMENTO",14,y);

 y+=6;

 let deptos;

 if(sucursal === "GLOBAL"){

   const { data } = await supabase.rpc("ventas_global_departamento",{ mes_param: mesSelect.value });
   deptos = data;

 }else{

   const { data } = await supabase.rpc("ventas_por_departamento",{
     sucursal_param:sucursal,
     mes_param:mesSelect.value
   });

   deptos = data;
 }

let totalGeneral = 0;
let totalCosto = 0;
let totalIVA = 0;
let totalIEPS = 0;

deptos.forEach(d=>{
 totalGeneral += Number(d.venta_total);
 totalCosto += Number(d.costo_compra_total);
 totalIVA += Number(d.iva_total || 0);
 totalIEPS += Number(d.ieps_total || 0);
});

 doc.setFontSize(11);
 doc.setFont(undefined,"bold");

doc.text("Departamento",14,y);
doc.text("Costo Compra",60,y);
doc.text("Subtotal",90,y);
doc.text("IVA",115,y);
doc.text("IEPS",140,y);
doc.text("Venta Total",165,y);
doc.text("Utilidad",185,y);

 y+=4;

 doc.setFont(undefined,"normal");

 doc.line(14,y,196,y);

 y+=4;

 deptos.forEach(d=>{

   const venta = Number(d.venta_total);
   const porcentaje = ((venta/totalGeneral)*100).toFixed(2);
   

const costo = Number(d.costo_compra_total);
// tasas de impuestos del departamento
const ivaRate = Number(d.iva || 0) / 100;
const iepsRate = Number(d.ieps || 0) / 100;


let iva = 0;
let ieps = 0;

if (d.iva == 16) {
  iva = venta - (venta / 1.16);
}

if (d.ieps == 8) {
  ieps = venta - (venta / 1.08);
}

const subtotal = venta - iva - ieps;
const utilidad = subtotal - costo;

doc.text(String(d.departamento),14,y);

doc.text("$"+costo.toLocaleString('es-MX',{minimumFractionDigits:2}),70,y);

doc.text("$"+subtotal.toLocaleString('es-MX',{minimumFractionDigits:2}),105,y);

doc.text("$"+iva.toLocaleString('es-MX',{minimumFractionDigits:2}),135,y);

doc.text("$"+ieps.toLocaleString('es-MX',{minimumFractionDigits:2}),160,y);

doc.text("$"+venta.toLocaleString('es-MX',{minimumFractionDigits:2}),185,y);

doc.text(
 "$"+utilidad.toLocaleString('es-MX',{minimumFractionDigits:2}),185,y);

doc.text(
 porcentaje+"%",
 195,
 y,
 {align:"right"}
);
   y+=5;

   if(y>270){
     doc.addPage();
     y=15;
   }

 });

 doc.line(14,y,196,y);

 y+=6;

 doc.setFont(undefined,"bold");

doc.text("TOTAL GENERAL",14,y);
doc.text(
 "$"+totalCosto.toLocaleString('es-MX',{minimumFractionDigits:2}),
 90,
 y
);

doc.text(
 "$"+totalIVA.toLocaleString('es-MX',{minimumFractionDigits:2}),
 120,
 y
);

doc.text(
 "$"+totalIEPS.toLocaleString('es-MX',{minimumFractionDigits:2}),
 145,
 y
);

doc.text(
 "$"+totalGeneral.toLocaleString('es-MX',{minimumFractionDigits:2}),
 170,
 y
);

 doc.setFont(undefined,"normal");

 y+=10;

  doc.save(`Reporte_${sucursal}.pdf`);

}
